<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">

        <div class="card-header bg-dark text-white text-center py-3">
          <h4 class="mb-0">🏠 Login to ShopForHome</h4>
        </div>

        <div class="card-body p-4">

          <!-- Error -->
          <div
            *ngIf="error"
            style="
              background-color: #f8d7da;
              color: #721c24;
              border: 1px solid #f5c6cb;
              border-radius: 8px;
              padding: 12px;
              margin-bottom: 15px;
              font-weight: 500;
            ">
            ❌ {{ error }}
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">
              Email
            </label>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="form.email"
              placeholder="Enter your email" />
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">
              Password
            </label>
            <input
              type="password"
              class="form-control"
              [(ngModel)]="form.password"
              placeholder="Enter your password" />
          </div>

          <div class="d-grid">
            <button
              type="button"
              [disabled]="loading"
              (click)="login()"
              style="
                display: block;
                width: 100%;
                padding: 12px;
                background-color: #212529;
                color: #ffffff;
                border: 2px solid #212529;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                outline: none;
                -webkit-appearance: none;
                appearance: none;
              ">
              {{ loading ? 'Logging in...' : 'Login' }}
            </button>
          </div>

          <hr class="my-3">

          <p class="text-center mb-0">
            Don't have an account?
            <a routerLink="/register"
              class="text-dark fw-bold">
              Register here
            </a>
          </p>

        </div>
      </div>
    </div>
  </div>
</div>
