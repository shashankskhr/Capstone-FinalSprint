<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand fw-bold" routerLink="/">
      🏠 ShopForHome
    </a>

    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- Search -->
      <div class="d-flex mx-auto my-2 my-lg-0">
        <input
          class="form-control me-2"
          type="search"
          placeholder="Search products..."
          [(ngModel)]="searchQuery"
          (keyup.enter)="search()"
          style="min-width: 250px;" />
        <button
          class="btn btn-warning"
          (click)="search()">
          🔍
        </button>
      </div>

      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link"
            routerLink="/products"
            routerLinkActive="active">
            Products
          </a>
        </li>

        <!-- Logged In -->
        <ng-container *ngIf="authService.isLoggedIn()">

          <li class="nav-item">
            <a class="nav-link"
              routerLink="/cart"
              routerLinkActive="active">
              🛒 Cart
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
              routerLink="/wishlist"
              routerLinkActive="active">
              ❤️ Wishlist
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
              routerLink="/orders"
              routerLinkActive="active">
              📦 Orders
            </a>
          </li>

          <!-- Admin Dropdown -->
          <ng-container *ngIf="authService.isAdmin()">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">
                ⚙️ Admin
              </a>
              <ul class="dropdown-menu
                dropdown-menu-dark
                dropdown-menu-end">
                <li>
                  <a class="dropdown-item"
                    routerLink="/admin">
                    📊 Dashboard
                  </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <a class="dropdown-item"
                    routerLink="/admin/products">
                    📦 Products
                  </a>
                </li>
                <li>
                  <a class="dropdown-item"
                    routerLink="/admin/users">
                    👥 Users
                  </a>
                </li>
                <li>
                  <a class="dropdown-item"
                    routerLink="/admin/coupons">
                    🎟️ Coupons
                  </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <a class="dropdown-item"
                    routerLink="/admin/reports">
                    📈 Reports
                  </a>
                </li>
                <li>
                  <a class="dropdown-item"
                    routerLink="/admin/stock">
                    🏪 Stock
                  </a>
                </li>
              </ul>
            </li>
          </ng-container>

          <!-- Logout -->
          <li class="nav-item">
            <a class="nav-link text-warning"
              href="#"
              (click)="logout();
                $event.preventDefault()">
              Logout
            </a>
          </li>

        </ng-container>

        <!-- Not Logged In -->
        <ng-container *ngIf="!authService.isLoggedIn()">
          <li class="nav-item">
            <a class="nav-link"
              routerLink="/login"
              routerLinkActive="active">
              Login
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link"
              routerLink="/register"
              routerLinkActive="active">
              Register
            </a>
          </li>
        </ng-container>

      </ul>
    </div>
  </div>
</nav>
