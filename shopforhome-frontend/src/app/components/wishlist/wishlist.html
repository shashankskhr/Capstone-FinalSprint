<div class="container my-4">
  <h3 class="fw-bold mb-4">❤️ My Wishlist</h3>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-dark" role="status">
    </div>
    <p class="mt-2 text-muted">Loading wishlist...</p>
  </div>

  <!-- Messages -->
  <div *ngIf="message" style="
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
    border-radius: 8px;
    padding: 10px 15px;
    margin-bottom: 15px;">
    {{ message }}
  </div>

  <div *ngIf="error" style="
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    border-radius: 8px;
    padding: 10px 15px;
    margin-bottom: 15px;">
    {{ error }}
  </div>

  <!-- Empty Wishlist -->
  <div *ngIf="!loading && wishlistItems.length === 0"
    class="text-center py-5">
    <h4 class="text-muted">❤️ Your wishlist is empty</h4>
    <p class="text-muted">
      Save products you love to your wishlist.
    </p>
    <button
      type="button"
      (click)="router.navigate(['/products'])"
      style="
        padding: 12px 30px;
        background-color: #212529;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;">
      Browse Products
    </button>
  </div>

  <!-- Wishlist Items -->
  <div class="row g-3"
    *ngIf="!loading && wishlistItems.length > 0">
    <div class="col-md-3 col-sm-6"
      *ngFor="let item of wishlistItems">
      <div class="card h-100 shadow-sm">
        <img
          [src]="item.product?.imageUrl ||
            'https://via.placeholder.com/300x180'"
          class="card-img-top"
          style="height:180px; object-fit:cover;"
          [alt]="item.product?.productName"
          onerror="this.src=
            'https://via.placeholder.com/300x180'">
        <div class="card-body">
          <h6 class="fw-bold">
            {{ item.product?.productName }}
          </h6>
          <small class="text-muted">
            {{ item.product?.category?.categoryName }}
          </small>
          <div class="fw-bold text-dark mt-2">
            ₹{{ item.product?.price }}
          </div>
          <span class="badge bg-warning text-dark mt-1">
            ⭐ {{ item.product?.rating }}
          </span>
        </div>
        <div class="card-footer bg-white border-0 pb-3">
          <button
            type="button"
            (click)="moveToCart(item)"
            style="
              display: block;
              width: 100%;
              padding: 8px;
              background-color: #212529;
              color: #ffffff;
              border: none;
              border-radius: 6px;
              font-size: 0.9rem;
              font-weight: 600;
              cursor: pointer;
              margin-bottom: 8px;">
            🛒 Move to Cart
          </button>
          <button
            type="button"
            (click)="remove(item.wishlistId)"
            style="
              display: block;
              width: 100%;
              padding: 8px;
              background-color: #ffffff;
              color: #dc3545;
              border: 2px solid #dc3545;
              border-radius: 6px;
              font-size: 0.9rem;
              font-weight: 600;
              cursor: pointer;">
            ✕ Remove
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
