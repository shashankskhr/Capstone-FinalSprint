<div class="container my-4">
  <h3>Manage Users</h3>
  <div class="alert alert-success" *ngIf="message">{{ message }}</div>

  <div class="card p-4 mb-4 shadow-sm">
    <h5>{{ editMode ? 'Edit' : 'Add' }} User</h5>
    <div class="row g-2">
      <div class="col-md-3">
        <input class="form-control" placeholder="Full Name" [(ngModel)]="form.fullName" />
      </div>
      <div class="col-md-3">
        <input type="email" class="form-control" placeholder="Email" [(ngModel)]="form.email" />
      </div>
      <div class="col-md-3">
        <input type="password" class="form-control" placeholder="Password"
          [(ngModel)]="form.password" />
      </div>
      <div class="col-md-3">
        <select class="form-select" [(ngModel)]="form.role">
          <option value="User">User</option>
          <option value="Admin">Admin</option>
        </select>
      </div>
    </div>
    <div class="mt-3">
      <button class="btn btn-dark me-2" (click)="save()">
        {{ editMode ? 'Update' : 'Add' }}
      </button>
      <button class="btn btn-outline-secondary" *ngIf="editMode" (click)="reset()">Cancel</button>
    </div>
  </div>

  <table class="table table-bordered table-hover">
    <thead class="table-dark">
      <tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of users">
        <td>{{ u.userId }}</td>
        <td>{{ u.fullName }}</td>
        <td>{{ u.email }}</td>
        <td><span class="badge" [class.bg-danger]="u.role==='Admin'"
          [class.bg-primary]="u.role==='User'">{{ u.role }}</span></td>
        <td>
          <button class="btn btn-sm btn-warning me-1" (click)="edit(u)">Edit</button>
          <button class="btn btn-sm btn-danger" (click)="delete(u.userId)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
