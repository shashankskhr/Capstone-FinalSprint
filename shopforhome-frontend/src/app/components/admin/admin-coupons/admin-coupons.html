<div class="container my-4">
  <h3 class="fw-bold mb-4">🎟️ Discount Coupons</h3>

  <!-- Messages -->
  <div *ngIf="message" style="
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
    border-radius: 8px;
    padding: 10px 15px;
    margin-bottom: 15px;">
    {{ message }}
  </div>

  <div *ngIf="error" style="
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    border-radius: 8px;
    padding: 10px 15px;
    margin-bottom: 15px;">
    {{ error }}
  </div>

  <div class="row g-4">

    <!-- Create Coupon -->
    <div class="col-md-4">
      <div class="card shadow-sm p-4">
        <h5 class="fw-bold mb-3">
          ➕ Create Coupon
        </h5>

        <div class="mb-3">
          <label class="form-label fw-bold">
            Coupon Code
          </label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="couponForm.couponCode"
            placeholder="e.g. SAVE20" />
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">
            Discount %
          </label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="couponForm.discountPercent"
            placeholder="e.g. 20"
            min="1" max="100" />
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">
            Expiry Date
          </label>
          <input
            type="date"
            class="form-control"
            [(ngModel)]="couponForm.expiryDate" />
        </div>

        <button
          type="button"
          (click)="createCoupon()"
          style="
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #212529;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;">
          Create Coupon
        </button>
      </div>
    </div>

    <!-- Assign Coupon -->
    <div class="col-md-4">
      <div class="card shadow-sm p-4">
        <h5 class="fw-bold mb-3">
          👥 Assign to Users
        </h5>

        <div class="mb-3">
          <label class="form-label fw-bold">
            Select Coupon
          </label>
          <select
            class="form-select"
            [(ngModel)]="assignForm.couponId">
            <option [ngValue]="null">
              -- Select Coupon --
            </option>
            <option
              *ngFor="let c of coupons"
              [value]="c.couponId">
              {{ c.couponCode }}
              ({{ c.discountPercent }}% off)
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">
            Select Users
          </label>
          <div style="
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;">
            <div *ngFor="let u of users"
              class="form-check mb-1">
              <input
                class="form-check-input"
                type="checkbox"
                [value]="u.userId"
                (change)="toggleUser(
                  u.userId, $event)" />
              <label class="form-check-label">
                {{ u.fullName }}
                <small class="text-muted">
                  ({{ u.email }})
                </small>
              </label>
            </div>
          </div>
        </div>

        <button
          type="button"
          (click)="assignCoupon()"
          style="
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #212529;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;">
          Assign Coupon
        </button>
      </div>
    </div>

    <!-- All Coupons -->
    <div class="col-md-4">
      <div class="card shadow-sm p-4">
        <h5 class="fw-bold mb-3">
          🎟️ All Coupons
        </h5>

        <div *ngIf="coupons.length === 0"
          class="text-muted text-center py-3">
          No coupons created yet.
        </div>

        <div *ngFor="let c of coupons"
          class="card mb-2 p-3 bg-light">
          <div class="d-flex justify-content-between
            align-items-center">
            <div>
              <strong>{{ c.couponCode }}</strong>
              <div class="text-success fw-bold">
                {{ c.discountPercent }}% OFF
              </div>
              <small class="text-muted">
                Expires:
                {{ c.expiryDate
                  ? (c.expiryDate | date)
                  : 'No Expiry' }}
              </small>
            </div>
            <span class="badge bg-dark">
              #{{ c.couponId }}
            </span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
